name: Fetch Plugin Metadata

on:
  schedule:
    - cron: '0 0 * * 0'  # runs weekly
  workflow_dispatch:

jobs:
  fetch-metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch plugin metadata
        run: |
          node scripts/fetch-metadata.js

      - name: Commit generated data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add usage-by-plugins.json
          git commit -m "Update plugin usage metadata [skip ci]" || echo "No changes"
          git push
          